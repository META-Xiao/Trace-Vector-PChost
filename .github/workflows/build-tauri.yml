name: Build Tauri EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install
      - run: npm run build
      - run: npx tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: trace-vector-pchost-windows
          path: src-tauri/target/release/trace-vector-pchost.exe
          retention-days: 30
